<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生成视频 — Tideo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="task-panel.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ==============================================
       AI 生成 — Landing + 左右分栏工作区
       ============================================== */

    /* ===== Landing 状态 ===== */
    .gen-landing {
        flex: 1;
        overflow-y: auto;
        padding: 0 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
    }
    .gen-landing::-webkit-scrollbar { width: 5px; }
    .gen-landing::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .gen-landing-scroll {
        max-width: 900px;
        width: 100%;
        text-align: center;
    }

    /* Hero */
    .gen-landing-hero {
        padding: 0 0 28px;
        position: relative;
        text-align: center;
    }
    .gen-landing-hero h1 {
        font-size: 2.2rem;
        font-weight: 800;
        line-height: 1.3;
        margin-bottom: 10px;
    }
    .gen-landing-hero p {
        font-size: 0.95rem;
        color: var(--text-muted);
        max-width: 640px;
        margin: 0 auto 28px;
    }

    /* Primary input area */
    .gen-primary-input {
        max-width: 900px;
        margin: 0 auto 28px;
    }
    .gen-input-box {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        transition: all 0.3s;
        overflow: hidden;
    }
    .gen-input-box:focus-within {
        border-color: rgba(99,102,241,0.35);
        box-shadow: 0 0 0 4px rgba(99,102,241,0.06), 0 0 40px rgba(99,102,241,0.05);
    }
    .gen-input-textarea {
        width: 100%;
        min-height: 100px;
        max-height: 200px;
        padding: 16px 18px 8px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 0.92rem;
        font-family: inherit;
        outline: none;
        resize: none;
        line-height: 1.7;
    }
    .gen-input-textarea::placeholder { color: var(--text-faint); }
    .gen-input-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px 10px;
    }
    .gen-input-left {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .gen-char-count {
        font-size: 0.7rem;
        color: var(--text-faint);
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-submit-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 24px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 24px rgba(99,102,241,0.25);
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }
    .gen-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(99,102,241,0.35); }
    .gen-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .gen-submit-btn::before {
        content: '';
        position: absolute; top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
        animation: shimmer 3s linear infinite;
    }

    /* Inspiration chips */
    .gen-inspo-wrap {
        margin-bottom: 20px;
    }
    .gen-inspo-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-faint);
        margin-bottom: 10px;
    }
    .gen-inspo-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }
    .gen-inspo-chip {
        padding: 7px 16px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-secondary);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
    }
    .gen-inspo-chip:hover {
        color: var(--text-primary);
        border-color: rgba(99,102,241,0.35);
        background: rgba(99,102,241,0.06);
        transform: translateY(-2px);
    }

    /* Capabilities row */
    .gen-caps {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 24px;
    }
    .gen-cap {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        color: var(--text-faint);
    }
    .gen-cap-dot {
        width: 4px; height: 4px;
        border-radius: 50%;
        background: rgba(99,102,241,0.4);
    }

    /* ===== 工作区顶栏 ===== */
    .gen-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        background: rgba(10,10,22,0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0;
        z-index: 100;
    }
    .gen-topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .gen-back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
    }
    .gen-back-link:hover { color: var(--text-primary); }
    .gen-topbar-divider {
        width: 1px;
        height: 18px;
        background: rgba(255,255,255,0.08);
    }
    .gen-topbar-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-primary);
    }
    .gen-topbar-badge {
        font-size: 0.68rem;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 6px;
        background: rgba(168,85,247,0.12);
        color: #c084fc;
        display: none;
    }
    .gen-topbar-badge.show {
        display: inline-block;
    }
    .gen-topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* ===== 工作区：左右分栏 ===== */
    .gen-workspace {
        display: none;
        flex: 1;
        min-height: 0;
        overflow: hidden;
    }
    .gen-workspace.active {
        display: flex;
    }

    /* Left: Canvas / Preview */
    .gen-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
        overflow: hidden;
    }

    /* Canvas area with video/storyboard */
    .gen-canvas-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 16px;
        min-height: 0;
    }
    .gen-canvas-container {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 960px;
        max-height: 100%;
        background: #0a0a16;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        transition: border-color 0.3s;
    }

    /* Left phases */
    .gen-left-phase {
        position: absolute;
        inset: 0;
        display: none;
        border-radius: inherit;
        overflow: hidden;
    }
    .gen-left-phase.active { display: flex; }

    /* ===== Empty / waiting state (步骤1/2/3) ===== */
    .gen-empty-view {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #06060a 0%, #0a0a1a 50%, #06060a 100%);
    }
    .gen-empty-inner { text-align: center; max-width: 320px; }
    .gen-empty-orb {
        position: relative;
        width: 72px; height: 72px;
        margin: 0 auto 20px;
    }
    .gen-empty-orb .gen-empty-ring {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 72px; height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(99,102,241,0.12);
        animation: genOrbPulse 3s ease-in-out infinite;
    }
    @keyframes genOrbPulse {
        0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
        50% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
    }
    .gen-empty-orb .gen-empty-core {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 40px; height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(99,102,241,0.1));
        display: flex; align-items: center; justify-content: center;
        border: 1px solid rgba(99,102,241,0.15);
    }
    .gen-empty-title {
        font-size: 0.88rem; font-weight: 600; color: var(--text-faint); margin-bottom: 6px;
    }
    .gen-empty-sub {
        font-size: 0.75rem; color: var(--text-dim); line-height: 1.5;
    }

    /* Storyboard grid in canvas */
    .gen-sb-view {
        flex-direction: column;
        background: #0a0a16;
    }
    .gen-sb-topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .gen-sb-badge {
        padding: 3px 10px;
        font-size: 0.68rem;
        font-weight: 600;
        color: #818cf8;
        background: rgba(99,102,241,0.1);
        border: 1px solid rgba(99,102,241,0.2);
        border-radius: 100px;
    }
    .gen-sb-info {
        font-size: 0.72rem;
        color: var(--text-muted);
    }
    .gen-sb-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 12px;
        overflow-y: auto;
        min-height: 0;
        align-content: start;
    }
    .gen-sb-grid::-webkit-scrollbar { width: 4px; }
    .gen-sb-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    .gen-sb-card {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(135deg, rgba(15,15,30,0.8), rgba(10,10,20,0.9));
        cursor: pointer;
        transition: all 0.3s;
        min-height: 120px;
    }
    .gen-sb-card:hover {
        border-color: rgba(99,102,241,0.3);
        transform: scale(1.02);
    }
    .gen-sb-card.selected {
        border-color: rgba(99,102,241,0.5);
        box-shadow: 0 0 20px rgba(99,102,241,0.15);
    }
    .gen-sb-card canvas { width: 100%; height: 100%; display: block; position: absolute; inset: 0; }
    .gen-sb-card-overlay {
        position: relative;
        z-index: 2;
        background: linear-gradient(transparent 30%, rgba(0,0,0,0.7));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 12px;
        min-height: 120px;
    }
    .gen-sb-card-num {
        position: absolute; top: 8px; left: 8px;
        width: 22px; height: 22px;
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.65rem; font-weight: 700; color: #fff;
        background: rgba(99,102,241,0.6); backdrop-filter: blur(8px);
    }
    .gen-sb-card-dur {
        position: absolute; top: 8px; right: 8px;
        padding: 2px 7px; font-size: 0.6rem; font-weight: 500; color: #fff;
        background: rgba(0,0,0,0.55); border-radius: 5px;
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-sb-card-title {
        font-size: 0.78rem; font-weight: 600; color: #fff; margin-bottom: 2px;
    }
    .gen-sb-card-desc {
        font-size: 0.62rem; color: rgba(255,255,255,0.6);
        display: -webkit-box; -webkit-line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;
    }

    /* Synthesis view */
    .gen-synth-view {
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #06060a 0%, #0a0a1a 50%, #06060a 100%);
    }
    .gen-synth-inner { text-align: center; max-width: 360px; }
    .gen-synth-orb {
        position: relative;
        width: 88px; height: 88px;
        margin: 0 auto 24px;
    }
    .gen-synth-orb .ring {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%); border-radius: 50%;
        border: 2px solid transparent;
    }
    .gen-synth-orb .ring:nth-child(1) { width:88px;height:88px; border-top-color:#a855f7; animation: spin 1.5s linear infinite; }
    .gen-synth-orb .ring:nth-child(2) { width:66px;height:66px; border-right-color:#6366f1; animation: spin 2s linear infinite reverse; }
    .gen-synth-orb .ring:nth-child(3) { width:44px;height:44px; border-bottom-color:#06b6d4; animation: spin 1s linear infinite; }
    .gen-synth-orb .core {
        position: absolute; top:50%;left:50%; transform:translate(-50%,-50%);
        width:18px;height:18px; border-radius:50%;
        background:linear-gradient(135deg,#a855f7,#06b6d4);
        box-shadow:0 0 24px rgba(99,102,241,0.5);
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .gen-synth-text { font-size: 0.92rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .gen-synth-sub { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 20px; }
    .gen-synth-progress {
        width: 220px; height: 3px;
        background: rgba(255,255,255,0.06); border-radius: 2px;
        overflow: hidden; margin: 0 auto 10px;
    }
    .gen-synth-bar {
        height: 100%;
        background: linear-gradient(90deg, #a855f7, #6366f1, #06b6d4);
        border-radius: 2px; width: 0%; transition: width 0.6s ease;
    }
    .gen-synth-clip-info {
        font-size: 0.72rem; color: var(--text-muted);
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-synth-dots {
        display: flex; gap: 6px; justify-content: center; margin-top: 16px;
    }
    .gen-synth-dot {
        width: 32px; height: 32px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.68rem; font-weight: 700;
        color: var(--text-faint); background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        transition: all 0.3s;
    }
    .gen-synth-dot.active {
        color: #818cf8;
        background: rgba(99,102,241,0.12);
        border-color: rgba(99,102,241,0.3);
        box-shadow: 0 0 14px rgba(99,102,241,0.15);
    }
    .gen-synth-dot.completed {
        color: #10b981;
        background: rgba(16,185,129,0.1);
        border-color: rgba(16,185,129,0.25);
    }

    /* Player view */
    .gen-player-view {
        background: #06060a;
    }
    .gen-player-view canvas { width: 100%; height: 100%; display: block; }
    .gen-player-controls {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        display: flex; align-items: center; gap: 10px;
        padding: 10px 16px;
        background: linear-gradient(transparent, rgba(0,0,0,0.7));
        z-index: 5;
    }
    .gen-timeline-overlay {
        position: absolute;
        bottom: 48px; left: 12px; right: 12px;
        display: flex; gap: 3px; height: 24px; z-index: 4;
    }
    .gen-tl-seg {
        display: flex; align-items: center; justify-content: center;
        border-radius: 5px; font-size: 0.58rem; font-weight: 600;
        border: 1px solid; transition: all 0.3s; cursor: default;
    }
    .gen-tl-seg.active {
        box-shadow: 0 0 10px rgba(99,102,241,0.2);
        transform: scaleY(1.08);
    }

    /* ===== Right: Chat Sidebar ===== */
    .gen-right {
        width: 380px;
        flex-shrink: 0;
        background: rgba(12,12,20,0.95);
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255,255,255,0.06);
        display: flex;
        flex-direction: column;
        z-index: 50;
        overflow: hidden;
    }

    /* Chat header */
    .gen-chat-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .gen-chat-header-icon {
        width: 28px; height: 28px;
        border-radius: 8px;
        background: rgba(99,102,241,0.12);
        color: #a855f7;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .gen-chat-header h3 { font-size: 0.85rem; font-weight: 600; }
    .gen-chat-header p { font-size: 0.68rem; color: var(--text-muted); }

    /* Chat body */
    .gen-chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
    }
    .gen-chat-body::-webkit-scrollbar { width: 4px; }
    .gen-chat-body::-webkit-scrollbar-track { background: transparent; }
    .gen-chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* Chat bubbles */
    .gen-bubble {
        display: flex;
        gap: 8px;
        animation: genBubbleIn 0.35s ease-out;
    }
    @keyframes genBubbleIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .gen-bubble--ai { align-items: flex-start; }
    .gen-bubble--user { flex-direction: row-reverse; }
    .gen-bubble-avatar {
        width: 28px; height: 28px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: 0.75rem; font-weight: 600;
    }
    .gen-bubble--ai .gen-bubble-avatar {
        background: rgba(99,102,241,0.12); color: #a855f7;
    }
    .gen-bubble--user .gen-bubble-avatar {
        background: rgba(59,130,246,0.12); color: #60a5fa;
    }
    .gen-bubble-content {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.82rem;
        line-height: 1.6;
    }
    .gen-bubble--ai .gen-bubble-content {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        color: #cbd5e1;
    }
    .gen-bubble--user .gen-bubble-content {
        background: rgba(99,102,241,0.12);
        border: 1px solid rgba(99,102,241,0.2);
        color: var(--text-primary);
    }

    /* Typing indicator (three dots) */
    .gen-typing { display: flex; gap: 4px; padding: 6px 0; }
    .gen-typing-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #64748b; animation: genTypingBounce 1.4s ease-in-out infinite;
    }
    .gen-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .gen-typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes genTypingBounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Step overview stepper (in chat) */
    .gen-stepper { display: flex; gap: 4px; margin: 8px 0 4px; padding: 10px 0; }
    .gen-stepper-item { flex: 1; text-align: center; position: relative; }
    .gen-stepper-num {
        display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
        align-items: center; justify-content: center;
        font-size: 0.62rem; font-weight: 700;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
        color: var(--text-faint); margin-bottom: 4px; transition: all 0.3s;
    }
    .gen-stepper-item.active .gen-stepper-num {
        background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4);
        color: #818cf8; box-shadow: 0 0 10px rgba(99,102,241,0.15);
    }
    .gen-stepper-item.completed .gen-stepper-num {
        background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); color: #10b981;
    }
    .gen-stepper-label { display: block; font-size: 0.58rem; color: var(--text-dim); line-height: 1.2; }
    .gen-stepper-item.active .gen-stepper-label { color: #818cf8; }
    .gen-stepper-item.completed .gen-stepper-label { color: #10b981; }

    /* Text segment preview cards (步骤2) */
    .gen-text-segments { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .gen-text-seg {
        background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px; padding: 10px 12px; transition: all 0.2s;
    }
    .gen-text-seg:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
    .gen-text-seg-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .gen-text-seg-badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 2px 8px; border-radius: 5px; font-size: 0.65rem; font-weight: 600;
    }

    <script src="app.js"></script>
    <script>
    (function() {
        // ===== Templates =====
        const templates = {
            product: '一款未来感十足的智能耳机静静地放在大理石桌面上，灯光从侧面打来，勾勒出产品的优美弧线。镜头缓缓推近，展示耳机的细节纹理和呼吸灯光效。随后场景切换到城市街头，一位年轻人戴上耳机，周围的喧嚣瞬间变成宁静的音乐世界。最后耳机 Logo 浮现在画面中央。',
            story: '清晨的小镇笼罩在薄雾中，一只流浪猫穿过空无一人的街道。它在一家面包店门口停下，透过玻璃窗看着里面忙碌的面包师。面包师注意到了窗外的猫，微笑着走出来，放下一碟温热的牛奶。猫低头喝着，尾巴轻轻摇摆。从此每个清晨，这里都有一份温暖的约定。',
            tutorial: '打开设计软件，一个空白画布出现在屏幕上。鼠标点击工具栏，选择画笔工具，开始在画布上勾勒一个简洁的 Logo 轮廓。接着切换到颜色面板，为 Logo 填充渐变色彩。添加文字排版，调整间距和大小。最后导出成品，一个专业的品牌 Logo 就完成了。',
            vlog: '飞机降落在巴厘岛，舱门打开的瞬间，热带的暖风扑面而来。画面切换到骑摩托穿越稻田的路上，两侧是无边的翠绿。在乌布的悬崖秋千上，女孩张开双臂拥抱蓝天。夕阳时分，在海边的岩石上，橘红色的天空倒映在平静的海面上。',
            promo: '从太空俯瞰地球，镜头急速下坠穿过云层，来到一座现代化的科技园区。玻璃幕墙反射着天光，年轻的工程师们在开放式办公区协作讨论。一组数据在全息屏幕上流动，展示着产品的全球用户增长曲线。最后公司的 Logo 在星空背景下亮起，slogan 缓缓浮现。'
        };

        const clipLabels = ['开场', '发展', '高潮', '结尾'];
        const clipColors = ['#a855f7', '#3b82f6', '#06b6d4', '#10b981'];
        const clipDurations = [5, 8, 6, 5];

        let clips = [];
        let selectedStyle = 'cinematic';
        let selectedRatio = '16:9';
        let selectedQuality = '1080';
        // phase: landing | parsing | textConfirm | styleConfig | storyboard | synth | player
        let phase = 'landing';
        let playing = true;
        let playTime = 0;
        let totalDuration = 24;
        let animFrame = null;
        let userText = '';

        const STEP_LABELS = ['文案解析', '文案确认', '风格选择', '分镜生成', '视频合成'];
        const STEP_COUNT = 5;

        // ===== DOM =====
        const landingInput = document.getElementById('landingInput');
        const charCount = document.getElementById('charCount');
        const genLanding = document.getElementById('genLanding');
        const genWorkspace = document.getElementById('genWorkspace');
        const chatBody = document.getElementById('chatBody');

        // ===== Char count =====
        landingInput.addEventListener('input', () => {
            charCount.textContent = landingInput.value.length;
        });

        // ===== Template chips =====
        document.querySelectorAll('.gen-inspo-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const tpl = chip.getAttribute('data-tpl');
                if (templates[tpl]) {
                    landingInput.value = templates[tpl];
                    charCount.textContent = landingInput.value.length;
                    landingInput.focus();
                }
            });
        });

        // ===== Start =====
        document.getElementById('startGenBtn').addEventListener('click', startCreation);

        function startCreation() {
            const text = landingInput.value.trim();
            if (!text) {
                landingInput.focus();
                landingInput.parentElement.parentElement.style.borderColor = 'rgba(239,68,68,0.5)';
                setTimeout(() => landingInput.parentElement.parentElement.style.borderColor = '', 1500);
                return;
            }
            userText = text;
            genLanding.style.display = 'none';
            document.getElementById('mainTopbar').style.display = 'none';
            document.getElementById('genTopbar').style.display = '';
            document.body.classList.add('fullscreen-mode');
            genWorkspace.classList.add('active');
            startParsing(text);
        }

        // ===== 从首页带 prompt 进来 → 自动填入并启动创作 =====
        (function() {
            var params = new URLSearchParams(window.location.search);
            var urlPrompt = params.get('prompt');
            if (urlPrompt && landingInput) {
                landingInput.value = urlPrompt;
                // 更新字数显示
                if (charCount) charCount.textContent = urlPrompt.length;
                // 短延迟后自动进入沉浸式工作区
                setTimeout(function() { startCreation(); }, 300);
            }
        })();

        // ===== Helpers =====
        function addBubble(type, html) {
            const bubble = document.createElement('div');
            bubble.className = `gen-bubble gen-bubble--${type}`;
            const avatarIcon = type === 'ai'
                ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>'
                : 'U';
            bubble.innerHTML = `<div class="gen-bubble-avatar">${avatarIcon}</div><div class="gen-bubble-content">${html}</div>`;
            chatBody.appendChild(bubble);
            chatBody.scrollTop = chatBody.scrollHeight;
            return bubble;
        }

        function addTypingBubble() {
            const b = document.createElement('div');
            b.className = 'gen-bubble gen-bubble--ai';
            b.id = 'typingBubble';
            b.innerHTML = `<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><div class="gen-typing"><div class="gen-typing-dot"></div><div class="gen-typing-dot"></div><div class="gen-typing-dot"></div></div></div>`;
            chatBody.appendChild(b);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function removeTypingBubble() {
            const el = document.getElementById('typingBubble');
            if (el) el.remove();
        }

        function buildStepperHTML(activeStep) {
            let h = '<div class="gen-stepper">';
            for (let i = 0; i < STEP_COUNT; i++) {
                let cls = 'gen-stepper-item';
                if (i < activeStep) cls += ' completed';
                else if (i === activeStep) cls += ' active';
                h += `<div class="${cls}"><span class="gen-stepper-num">${i < activeStep ? '✓' : (i+1)}</span><span class="gen-stepper-label">${STEP_LABELS[i]}</span></div>`;
            }
            return h + '</div>';
        }

        function setLeftPhase(id) {
            document.querySelectorAll('.gen-left-phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateEmptyState(title, sub) {
            document.getElementById('emptyTitle').textContent = title;
            document.getElementById('emptySub').textContent = sub;
        }


        // ===========================================================
        //  步骤 1/5 — 文案解析
        // ===========================================================
        // ===== Topbar Badge 辅助 =====
        function updateTopbarBadge(text) {
            var badge = document.getElementById('genTopbarBadge');
            if (!badge) return;
            if (text) {
                badge.textContent = text;
                badge.classList.add('show');
            } else {
                badge.classList.remove('show');
            }
        }

        function startParsing(text) {
            phase = 'parsing';
            updateTopbarBadge('解析中...');
            // 任务进度：解析文案中
            if (window.TideoTaskPanel) {
                TideoTaskPanel.markStep('parse', 'active');
            }
            setLeftPhase('phaseEmpty');
            updateEmptyState('等待文案解析完成', 'AI 正在分析你的文案结构...');
            chatBody.innerHTML = '';

            addBubble('user', `<p>${text.substring(0, 120)}${text.length > 120 ? '...' : ''}</p>`);
            addBubble('ai', `<p>🎬 <strong>创作流程总览</strong> — 共 ${STEP_COUNT} 个步骤</p>${buildStepperHTML(0)}<p style="font-size:0.78rem;color:#94a3b8;margin-top:4px;">正在解析你的文案，请稍候…</p>`);
            addTypingBubble();

            const sentences = text.replace(/([。！？.!?])/g, '$1||').split('||').filter(s => s.trim());
            const chunkSize = Math.ceil(sentences.length / 4);

            setTimeout(() => {
                clips = [];
                for (let i = 0; i < 4; i++) {
                    const start = i * chunkSize;
                    const chunk = sentences.slice(start, start + chunkSize).join('');
                    clips.push({ id: i+1, title: clipLabels[i], duration: clipDurations[i], desc: chunk.trim() || '（AI 将自动生成画面描述）', color: clipColors[i] });
                }
                totalDuration = clips.reduce((s, c) => s + c.duration, 0);
                removeTypingBubble();
                showTextConfirm();
            }, 2500);
        }

        // ===========================================================
        //  步骤 2/5 — 文案确认
        // ===========================================================
        function showTextConfirm() {
            phase = 'textConfirm';
            // 任务进度：解析完成 → 文案确认中
            if (window.TideoTaskPanel) {
                TideoTaskPanel.markStep('parse', 'done');
                TideoTaskPanel.markStep('textConfirm', 'active');
            }
            setLeftPhase('phaseEmpty');
            updateEmptyState('等待确认文案', '确认文案后将进入风格选择');

            let segs = '<div class="gen-text-segments">';
            clips.forEach((c, i) => {
                segs += `<div class="gen-text-seg"><div class="gen-text-seg-head"><span class="gen-text-seg-badge" style="background:${c.color}15;color:${c.color};border:1px solid ${c.color}30;">片段 ${c.id} · ${c.title}</span><span class="gen-text-seg-dur">${c.duration}s</span></div><textarea data-seg-idx="${i}">${c.desc}</textarea></div>`;
            });
            segs += '</div>';

            addBubble('ai', `<p>✅ 解析完成！共拆分为 <strong>${clips.length} 个片段</strong>，总时长约 <strong>${totalDuration}s</strong>。</p>${buildStepperHTML(1)}<p style="font-size:0.78rem;color:#94a3b8;margin-top:4px;">请检查以下文案，可直接编辑。确认无误后点击下方按钮：</p>${segs}<button class="gen-confirm-config" id="confirmTextBtn">确认文案，选择风格 →</button>`);

            document.querySelectorAll('.gen-text-seg textarea').forEach(ta => {
                ta.addEventListener('input', e => {
                    const idx = parseInt(e.target.dataset.segIdx);
                    if (clips[idx]) clips[idx].desc = e.target.value;
                });
            });

            document.getElementById('confirmTextBtn').addEventListener('click', function() {
                this.disabled = true; this.style.opacity = '0.5'; this.innerHTML = '✅ 文案已确认';
                addBubble('user', '<p>文案确认，进入风格选择</p>');
                setTimeout(() => showStyleConfig(), 300);
            });
        }

        // ===========================================================
        //  步骤 3/5 — 风格选择
        // ===========================================================
        function showStyleConfig() {
            phase = 'styleConfig';
            // 任务进度：文案确认完成 → 选择风格中
            if (window.TideoTaskPanel) {
                TideoTaskPanel.markStep('textConfirm', 'done');
                TideoTaskPanel.markStep('style', 'active');
            }
            setLeftPhase('phaseEmpty');
            updateEmptyState('等待选择风格', '选择视频风格后将开始生成分镜画面');

        function bindClipEditors() {
            document.querySelectorAll('.gen-clip-desc-input').forEach(ta => {

        // ===== Draw clip preview =====
        function drawClipPreview(canvas, clip, idx) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const hue1 = (idx * 85 + 180) % 360;
            const hue2 = (hue1 + 50) % 360;
            const grd = ctx.createLinearGradient(0, 0, w, h);
            grd.addColorStop(0, `hsl(${hue1}, 35%, 12%)`);
            grd.addColorStop(0.5, `hsl(${hue2}, 30%, 16%)`);
            grd.addColorStop(1, `hsl(${(hue1+120)%360}, 25%, 10%)`);
            ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
            ctx.globalAlpha = 0.15;
            for (let j = 0; j < 6; j++) {
                const x = (Math.sin(idx*3 + j*1.5)*0.3+0.5)*w;
                const y = (Math.cos(idx*2 + j*2.3)*0.3+0.5)*h;
                ctx.beginPath(); ctx.arc(x, y, 30+j*15, 0, Math.PI*2);
                ctx.fillStyle = clip.color; ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

                const pct = ((clipIdx+1)/clips.length)*100;
                bar.style.width = (pct - 100/clips.length) + '%';
                const gt = 1500 + Math.random()*1500;
                setTimeout(() => { bar.style.width = pct + '%'; clipIdx++; setTimeout(processClip, 300); }, gt);

            document.getElementById('chatRegen')?.addEventListener('click', () => { if (animFrame) cancelAnimationFrame(animFrame); startSynth(); });

                addBubble('ai', '<p>📥 视频导出中... 格式 MP4 (H.264)、分辨率 1080p。完成后将自动下载。</p><p style="font-size:0.78rem;color:#94a3b8;margin-top:4px;">💡 你也可以点击「保存到云点播」将视频直接存入腾讯云点播。</p>');
            });
            document.getElementById('chatTranslateEn')?.addEventListener('click', () => {
                if (window.TideoPageInput && window.TideoPageInput._saveContext) {
                    window.TideoPageInput._saveContext('generate');
                }
                window.location.href = 'translate-v7.html?prompt=' + encodeURIComponent('翻译成英语');
            });
            document.getElementById('chatSaveVodBtn')?.addEventListener('click', function() {
                this.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 10.5L12 3.5" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 已保存到云点播';
                this.style.background = 'rgba(16,185,129,0.15)';

        function initPlayer() {
            const canvas = document.getElementById('playerCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            const durEl = document.getElementById('ctrlDur');
            const m = Math.floor(totalDuration/60); const s = totalDuration%60;
            durEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            playTime = 0; playing = true;
            document.getElementById('ctrlPlay').classList.add('playing');
            renderTimelineOverlay();
            function tick() {
                if (playing) { playTime += 1/60; if (playTime >= totalDuration) playTime = 0; }
                drawPlayerFrame(playTime); updatePlayerUI();
                animFrame = requestAnimationFrame(tick);
            }
            tick();
        }

        function drawPlayerFrame(t) {
            const canvas = document.getElementById('playerCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width/dpr; const h = canvas.height/dpr;
            ctx.save(); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);
            let elapsed = 0; let currentClip = clips[0];
            for (const c of clips) { if (t < elapsed + c.duration) { currentClip = c; break; } elapsed += c.duration; }
            const clipT = t - elapsed; const clipPct = clipT / currentClip.duration;
            const idx = clips.indexOf(currentClip);
            const hue1 = (idx*85+180+t*3)%360; const hue2 = (hue1+50)%360;
            const grd = ctx.createLinearGradient(0,0,w,h);
            grd.addColorStop(0, `hsl(${hue1}, 40%, 12%)`);
            grd.addColorStop(0.5, `hsl(${hue2}, 35%, 16%)`);
            grd.addColorStop(1, `hsl(${(hue1+120)%360}, 30%, 10%)`);
            ctx.fillStyle = grd; ctx.fillRect(0,0,w,h);
            ctx.globalAlpha = 0.25;
            for (let i = 0; i < 12; i++) {
                const px = (Math.sin(t*0.2+i*2.1)*0.4+0.5)*w;
                const py = (Math.cos(t*0.15+i*1.8)*0.4+0.5)*h;
                ctx.beginPath(); ctx.arc(px, py, 2+Math.sin(t*0.5+i)*1.5, 0, Math.PI*2);
                ctx.fillStyle = currentClip.color; ctx.fill();
            }
            ctx.globalAlpha = 0.06;
            ctx.beginPath(); ctx.arc(w/2+Math.sin(t*0.3)*60, h/2+Math.cos(t*0.2)*40, 150+Math.sin(t*0.4)*30, 0, Math.PI*2);
            ctx.fillStyle = currentClip.color; ctx.fill();
            ctx.globalAlpha = 0.15+clipPct*0.15;
            ctx.font = `bold ${Math.min(w*0.04,32)}px Inter, sans-serif`;
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(currentClip.title, w/2, h/2-8);
            ctx.font = `${Math.min(w*0.02,14)}px Inter, sans-serif`;
            ctx.fillStyle = currentClip.color; ctx.globalAlpha = 0.3;
            ctx.fillText(`片段 ${currentClip.id} · ${currentClip.duration}s`, w/2, h/2+24);
            ctx.globalAlpha = 1; ctx.restore();
        }

        function updatePlayerUI() {
            const pct = (playTime/totalDuration)*100;
            document.getElementById('ctrlFill').style.width = pct + '%';
            document.getElementById('ctrlHandle').style.left = pct + '%';
            const m = Math.floor(playTime/60); const s = Math.floor(playTime%60);
            document.getElementById('ctrlTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            let elapsed = 0;
            document.querySelectorAll('.gen-tl-seg').forEach((seg, i) => {
                const clip = clips[i]; if (!clip) return;
                seg.classList.toggle('active', playTime >= elapsed && playTime < elapsed + clip.duration);
                elapsed += clip.duration;
            });
        }

        function renderTimelineOverlay() {
            const el = document.getElementById('timelineOverlay');
            if (!el) return;
            el.innerHTML = clips.map(c => {
                const pct = (c.duration/totalDuration)*100;
                return `<div class="gen-tl-seg" style="width:${pct}%;background:${c.color}12;border-color:${c.color}30;color:${c.color};">${c.title}</div>`;
            }).join('');
        }

        // ===== Player controls =====
        document.getElementById('ctrlPlay').addEventListener('click', () => {
            playing = !playing;
            document.getElementById('ctrlPlay').classList.toggle('playing', playing);
        });
        document.getElementById('ctrlProgress').addEventListener('click', e => {
            const rect = e.currentTarget.getBoundingClientRect();
            playTime = Math.max(0, Math.min(1, (e.clientX - rect.left)/rect.width)) * totalDuration;
        });

        // ===========================================================
        //  精调面板 — gen-middle
        // ===========================================================
        let finetuneClipIdx = null;

        function openFinetunePanel(clipIdx) {
            const middle = document.getElementById('genMiddle');
            const body = document.getElementById('genMiddleBody');
            const container = document.getElementById('canvasContainer');
            if (!middle || !body) return;

            finetuneClipIdx = clipIdx !== undefined ? clipIdx : null;
            document.getElementById('genMiddleDesc').textContent =
                clipIdx !== undefined ? `编辑片段 ${clips[clipIdx].id}「${clips[clipIdx].title}」` : '编辑所有片段';

            // 渲染片段卡片
            let html = '';
            clips.forEach((c, i) => {
                const isActive = clipIdx === i;
                html += `<div class="gen-ft-card${isActive ? ' active' : ''}" data-ft-idx="${i}">
                    <div class="gen-ft-card-head" data-ft-toggle="${i}">
                        <span class="gen-ft-card-badge" style="background:${c.color}15;color:${c.color};border:1px solid ${c.color}30;">片段 ${c.id} · ${c.title}</span>
                        <span class="gen-ft-card-dur" data-ft-dur-display="${i}">${c.duration}s</span>
                    </div>
                    <div class="gen-ft-card-body${isActive ? '' : ' collapsed'}" data-ft-body="${i}">
                        <div class="gen-ft-thumb"><canvas width="400" height="120" data-ft-canvas="${i}"></canvas></div>
                        <div class="gen-ft-field">
                            <span class="gen-ft-label">画面描述</span>
                            <textarea class="gen-ft-textarea" data-ft-desc="${i}">${c.desc}</textarea>
                        </div>
                        <div class="gen-ft-field">
                            <span class="gen-ft-label">时长</span>
                            <div class="gen-ft-dur-row">
                                <input type="range" class="gen-ft-dur-slider" data-ft-slider="${i}" min="2" max="15" value="${c.duration}">
                                <span class="gen-ft-dur-value" data-ft-dur-val="${i}">${c.duration}s</span>
                            </div>
                        </div>
                        <div class="gen-ft-actions">
                            <button class="gen-ft-action" data-ft-regen="${i}">🔄 重新生成此片段</button>
                            <button class="gen-ft-action" data-ft-ai="${i}">🔮 AI 优化描述</button>
                        </div>
                    </div>
                </div>`;
            });
            body.innerHTML = html;

            // 绘制缩略图
            clips.forEach((c, i) => {
                const cvs = document.querySelector(`canvas[data-ft-canvas="${i}"]`);
                if (cvs) drawClipPreview(cvs, c, i);
            });

            // 绑定展开/折叠
            body.querySelectorAll('[data-ft-toggle]').forEach(head => {
                head.addEventListener('click', () => {
                    const idx = parseInt(head.dataset.ftToggle);
                    const cardBody = body.querySelector(`[data-ft-body="${idx}"]`);
                    const card = head.closest('.gen-ft-card');
                    if (cardBody) cardBody.classList.toggle('collapsed');
                    if (card) card.classList.toggle('active');
                });
            });

            // 绑定描述编辑
            body.querySelectorAll('[data-ft-desc]').forEach(ta => {
                ta.addEventListener('input', () => {
                    const idx = parseInt(ta.dataset.ftDesc);
                    if (clips[idx]) clips[idx].desc = ta.value;
                });
            });

            // 绑定时长滑块
            body.querySelectorAll('[data-ft-slider]').forEach(slider => {
                slider.addEventListener('input', () => {
                    const idx = parseInt(slider.dataset.ftSlider);
                    const val = parseInt(slider.value);
                    if (clips[idx]) clips[idx].duration = val;
                    const durVal = body.querySelector(`[data-ft-dur-val="${idx}"]`);
                    if (durVal) durVal.textContent = val + 's';
                    const durDisplay = body.querySelector(`[data-ft-dur-display="${idx}"]`);
                    if (durDisplay) durDisplay.textContent = val + 's';
                });
            });

            // 绑定重生成 / AI 优化
            body.querySelectorAll('[data-ft-regen]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.ftRegen);
                    btn.textContent = '⏳ 重新生成中...';
                    btn.style.opacity = '0.5';
                    setTimeout(() => {
                        btn.textContent = '✅ 已重新生成';
                        const cvs = document.querySelector(`canvas[data-ft-canvas="${idx}"]`);
                        if (cvs) drawClipPreview(cvs, clips[idx], idx);
                        addBubble('ai', `<p style="font-size:0.78rem;">✅ 片段 ${clips[idx].id}「${clips[idx].title}」已重新生成</p>`);
                        setTimeout(() => { btn.textContent = '🔄 重新生成此片段'; btn.style.opacity = ''; }, 1500);
                    }, 2000);
                });
            });
            body.querySelectorAll('[data-ft-ai]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    btn.textContent = '⏳ 优化中...';
                    btn.style.opacity = '0.5';
                    setTimeout(() => {
                        btn.textContent = '✅ 已优化';
                        setTimeout(() => { btn.textContent = '🔮 AI 优化描述'; btn.style.opacity = ''; }, 1200);
                    }, 1500);
                });
            });

            // 打开面板
            middle.classList.add('active');
            if (container) container.classList.add('finetune-active');

            // 如果指定了片段，滚动到对应卡片
            if (clipIdx !== undefined) {
                setTimeout(() => {
                    const targetCard = body.querySelector(`[data-ft-idx="${clipIdx}"]`);
                    if (targetCard) targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 300);
            }
        }

        function closeFinetunePanel() {
            const middle = document.getElementById('genMiddle');
            const container = document.getElementById('canvasContainer');
            if (middle) middle.classList.remove('active');
            if (container) container.classList.remove('finetune-active');
            finetuneClipIdx = null;
            // 刷新分镜视图和右侧编辑器
            totalDuration = clips.reduce((s, c) => s + c.duration, 0);
        }

        // 绑定关闭/取消/确认
        document.getElementById('genMiddleClose')?.addEventListener('click', closeFinetunePanel);
        document.getElementById('genFtCancel')?.addEventListener('click', closeFinetunePanel);
        document.getElementById('genFtConfirm')?.addEventListener('click', () => {
            closeFinetunePanel();
            addBubble('ai', '<p>✅ 精调修改已应用！分镜预览已更新。</p>');
            // 刷新分镜画面
            if (phase === 'storyboard') {
                const sbCards = document.querySelectorAll('.gen-sb-card canvas');
                sbCards.forEach((cvs, i) => { if (clips[i]) drawClipPreview(cvs, clips[i], i); });
                document.getElementById('sbInfo').textContent = `${clips.length} 个片段 · 总时长 ${totalDuration}s`;
            }
        });

        // 暴露给全局供 tideo:pageinput 调用
        window._openFinetunePanel = openFinetunePanel;

    })();
    </script>

    <!-- 用户菜单逻辑 -->
    <script>
    (function() {
        var avatar = document.getElementById('userAvatar');
        var avatarLetter = document.getElementById('userAvatarLetter');
        var dropdown = document.getElementById('userDropdown');
        var dropdownAvatar = document.getElementById('dropdownAvatar');
        var dropdownName = document.getElementById('dropdownName');
        var dropdownHint = document.getElementById('dropdownHint');
        var loginBtn = document.getElementById('userLoginBtn');
        var logoutBtn = document.getElementById('userLogoutBtn');

        function updateUserUI() {
            var raw = localStorage.getItem('tideo_user');
            if (raw) {
                try {
                    var user = JSON.parse(raw);
                    var initial = user.avatar || user.name.charAt(0).toUpperCase();
                    avatarLetter.textContent = initial;
                    dropdownAvatar.textContent = initial;
                    dropdownName.textContent = user.name;
                    dropdownHint.textContent = '已登录';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'flex';
                    avatar.title = user.name;
                } catch(e) {}
            } else {
                avatarLetter.textContent = 'U';
                dropdownAvatar.textContent = 'U';
                dropdownName.textContent = '未登录';
                dropdownHint.textContent = '点击登录';
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
                avatar.title = '用户';
            }
        }

        avatar.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== avatar) {
                dropdown.classList.remove('show');
            }
        });

        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });

        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('tideo_user');
            updateUserUI();
            dropdown.classList.remove('show');
        });

        updateUserUI();

        window.addEventListener('storage', function(e) {
            if (e.key === 'tideo_user') updateUserUI();
        });
    })();
    </script>

    <!-- 任务清单 + 底部输入框 -->
    <script src="task-panel.js"></script>
    <script>
    (function() {
        // 初始化底部面板（进度 + 输入框一体化）
        TideoPageInput.init('generate');
        TideoTaskPanel.init('generate');

        // 监听底部输入框指令 — 根据 action 真正处理
        document.addEventListener('tideo:pageinput', function(e) {
            var text = e.detail.text;
            var action = e.detail.action || 'chat';
            var chatBody = document.getElementById('chatBody');
            if (!chatBody) return;

            // 1. 用户气泡
            var userBubble = document.createElement('div');
            userBubble.className = 'gen-bubble gen-bubble--user';
            userBubble.innerHTML = '<div class="gen-bubble-avatar">U</div><div class="gen-bubble-content"><p>' + text + '</p></div>';
            chatBody.appendChild(userBubble);
            chatBody.scrollTop = chatBody.scrollHeight;

            // 2. 根据 action 处理
            if (action === 'new-task') {
                // 同技能追加新任务
                setTimeout(function() {
                    var aiBubble = document.createElement('div');
                    aiBubble.className = 'gen-bubble gen-bubble--ai';
                    aiBubble.innerHTML = '<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><p>好的，正在按新要求重新创作视频。保留之前的素材上下文，开始新一轮生成...</p></div>';
                    chatBody.appendChild(aiBubble);
                    chatBody.scrollTop = chatBody.scrollHeight;

                    // 重置进度
                    if (window.TideoTaskPanel) {
                        TideoTaskPanel.reset({});
                        TideoTaskPanel.markStep('parse', 'active', '重新解析意图');
                    }

                    // 模拟生成流程
                    var genSteps = [
                        { id: 'parse', nextId: 'textConfirm', delay: 1500, msg: '✅ 文案意图解析完成' },
                        { id: 'textConfirm', nextId: 'style', delay: 1200, msg: '✅ 文案分段已确认' },
                        { id: 'style', nextId: 'storyboard', delay: 1800, msg: '✅ 视频风格已选定' },
                        { id: 'storyboard', nextId: 'synth', delay: 3000, msg: '✅ 分镜画面生成完成' },
                        { id: 'synth', nextId: 'done', delay: 3500, msg: '✅ 视频合成完成' },
                        { id: 'done', nextId: null, delay: 0, msg: '🎬 新视频已生成完毕！你可以预览或导出。' }
                    ];
                    var elapsed = 1000;
                    genSteps.forEach(function(step, idx) {
                        elapsed += step.delay;
                        setTimeout(function() {
                            if (window.TideoTaskPanel) {
                                TideoTaskPanel.markStep(step.id, 'done');
                                if (step.nextId) TideoTaskPanel.markStep(step.nextId, 'active');
                            }
                            var bubble = document.createElement('div');
                            bubble.className = 'gen-bubble gen-bubble--ai';
                            bubble.innerHTML = '<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><p>' + step.msg + '</p></div>';
                            chatBody.appendChild(bubble);
                            chatBody.scrollTop = chatBody.scrollHeight;
                        }, elapsed);
                    });
                }, 500);

            } else if (action === 'finetune' || action === 'redo') {
                // 精调或重做
                setTimeout(function() {
                    var aiBubble = document.createElement('div');
                    aiBubble.className = 'gen-bubble gen-bubble--ai';
                    aiBubble.innerHTML = '<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><p>收到！正在按你的要求调整参数...</p></div>';
                    chatBody.appendChild(aiBubble);
                    chatBody.scrollTop = chatBody.scrollHeight;

                    // 尝试从文本中解析片段号，打开精调面板
                    var clipMatch = text.match(/第(\d+)/);
                    var targetIdx = clipMatch ? parseInt(clipMatch[1]) - 1 : undefined;
                    if (window._openFinetunePanel) {
                        window._openFinetunePanel(targetIdx !== undefined && targetIdx >= 0 ? targetIdx : undefined);
                    }

                    setTimeout(function() {
                        var doneBubble = document.createElement('div');
                        doneBubble.className = 'gen-bubble gen-bubble--ai';
                        doneBubble.innerHTML = '<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><p>✅ 调整完成！已更新到预览中。</p></div>';
                        chatBody.appendChild(doneBubble);
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }, 2500);
                }, 500);

            } else {
                // 普通对话
                setTimeout(function() {
                    var aiBubble = document.createElement('div');
                    aiBubble.className = 'gen-bubble gen-bubble--ai';
                    aiBubble.innerHTML = '<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><p>收到你的指令。你可以试试：<br><span style="color:#94a3b8;font-size:0.75rem;">• 「换一种风格重新生成」<br>• 「时长延长到2分钟」<br>• 「换一段背景音乐」</span></p></div>';
                    chatBody.appendChild(aiBubble);
                    chatBody.scrollTop = chatBody.scrollHeight;
                }, 500);
            }
        });

        // 监听停止按钮
        document.addEventListener('tideo:stop', function() {
            var chatBody = document.getElementById('chatBody');
            if (!chatBody) return;

            // 将所有 active 步骤标记为 done
            if (window.TideoTaskPanel) {
                var tasks = TideoTaskPanel._tasks;
                for (var i = 0; i < tasks.length; i++) {
                    if (tasks[i].status === 'active') {
                        TideoTaskPanel.markStep(tasks[i].id, 'done', '已停止');
                    }
                }
            }

            var aiBubble = document.createElement('div');
            aiBubble.className = 'gen-bubble gen-bubble--ai';
            aiBubble.innerHTML = '<div class="gen-bubble-avatar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg></div><div class="gen-bubble-content"><p>⏹ 已停止当前任务。你可以继续输入新的指令。</p></div>';
            chatBody.appendChild(aiBubble);
            chatBody.scrollTop = chatBody.scrollHeight;
        });
    })();
    </script>
