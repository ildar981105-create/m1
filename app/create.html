<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 — Tideo</title>
    <script>
    // 最早的阻塞脚本：防止主题切换时闪烁
    (function(){
        var t = localStorage.getItem('tideo_theme');
        if (t === 'dark') {
            document.documentElement.removeAttribute('data-theme');
        } else if (t === 'light' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            // 无保存值且系统非亮色 → 暗色
            document.documentElement.removeAttribute('data-theme');
        }
    })();
    </script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ===== 亮色模式全面覆盖 ===== */

    /* ---- 全局基础 ---- */
    [data-theme="light"] body,

    [data-theme="light"] .cfg-drop-item,
    [data-theme="light"] .pd-menu-item,
    [data-theme="light"] .skill-picker-item {
        color: #475569 !important;

    [data-theme="light"] .cfg-drop-item:hover,
    [data-theme="light"] .pd-menu-item:hover,

    [data-theme="light"] .skill-picker-divider {

    }

    }

    /* ---- 技能标签占位 ---- */
    [data-theme="light"] .skill-tag--placeholder {
        background: rgba(0,0,0,0.03) !important;
        border-color: rgba(0,0,0,0.12) !important;

    }
    [data-theme="light"] .skill-tag--placeholder:hover {
        background: rgba(0,0,0,0.05) !important;
        color: #475569 !important;

        background: rgba(0,0,0,0.08) !important;
    }

    /* ---- 角色热区名牌 ---- */
    [data-theme="light"] .crew-hotspot-label {
        background: rgba(255,255,255,0.95) !important;
        border-color: rgba(0,0,0,0.08) !important;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1) !important;
    }
    [data-theme="light"] .crew-hotspot-name {
        color: #1e293b !important;
    }
    [data-theme="light"] .crew-hotspot-role {
        color: #64748b !important;
    }
    [data-theme="light"] .crew-hotspot:hover {
        background: transparent !important;
        box-shadow: none !important;
    }

    /* ---- 角色详情面板 ---- */
    [data-theme="light"] .char-detail-overlay {
        background: rgba(0,0,0,0.2) !important;
    }
    [data-theme="light"] .char-detail-panel {
        background: rgba(255,255,255,0.98) !important;

        box-shadow: 0 32px 80px rgba(0,0,0,0.12) !important;
    }
    [data-theme="light"] .char-detail-name {
        color: #1e293b !important;
    }
    [data-theme="light"] .char-detail-motto {
        color: #64748b !important;
    }
    [data-theme="light"] .char-detail-section-title {
        color: #94a3b8 !important;
    }
    [data-theme="light"] .char-detail-text {
        color: #475569 !important;
    }
    [data-theme="light"] .char-detail-close {
        border-color: rgba(0,0,0,0.08) !important;
        background: rgba(0,0,0,0.04) !important;
        color: #64748b !important;
    }
    [data-theme="light"] .char-detail-close:hover {
        background: rgba(0,0,0,0.08) !important;
        color: #1e293b !important;
    }
    [data-theme="light"] .char-detail-divider {
        background: rgba(0,0,0,0.06) !important;
    }
    [data-theme="light"] .char-detail-avatar {
        border-color: rgba(0,0,0,0.08) !important;
    }
    [data-theme="light"] .char-skill-tag {
        border-color: rgba(0,0,0,0.08) !important;
        background: rgba(0,0,0,0.03) !important;
        color: #475569 !important;
    }

    /* ---- 用户下拉 ---- */
    [data-theme="light"] .user-dropdown {
        background: rgba(255,255,255,0.97) !important;
        border-color: rgba(0,0,0,0.08) !important;
        box-shadow: 0 12px 40px rgba(0,0,0,0.1) !important;
    }
    [data-theme="light"] .user-dropdown-name {
        color: #1e293b !important;
    }
    [data-theme="light"] .user-dropdown-hint {
        color: #94a3b8 !important;
    }
    [data-theme="light"] .user-dropdown-divider {
        background: rgba(0,0,0,0.06) !important;
    }
    [data-theme="light"] .user-dropdown-item {
        color: #64748b !important;
    }
    [data-theme="light"] .user-dropdown-item:hover {
        color: #1e293b !important;
        background: rgba(0,0,0,0.04) !important;
    }

    /* ---- "或者试试" 提示文字 ---- */
    [data-theme="light"] .home-left > div:not(.skill-list):not(.home-input-wrap):not(.skill-list-label) {
        color: #64748b !important;
    }

    /* ---- 滚动条 ---- */
    [data-theme="light"] .home-left::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.08) !important;
    }

    /* ---- nudge toast ---- */
    [data-theme="light"] .nudge-toast-text {
        color: #1e293b !important;
    }

    /* ---- 输入框 placeholder ---- */
    [data-theme="light"] .input-rich:empty::before {
        color: #94a3b8 !important;
    }

    /* ---- 选择技能按钮 / 配置胶囊箭头 ---- */
    [data-theme="light"] .cfg-arrow {
        color: #94a3b8 !important;
    }

    /* ---- 底部 "选择技能" 按钮样式 ---- */
    [data-theme="light"] .select-skill-btn,
    [data-theme="light"] [class*="select-skill"] {
        color: #475569 !important;
        border-color: rgba(0,0,0,0.1) !important;
    }
    /* ===== create.html v4 — 居中标题 + 左右布局 ===== */

    .create-home {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
    }

    /* 氛围光 */
    .create-home::before {
        content: '';
        position: fixed;
        top: -10%; right: 0%;
        width: 900px; height: 800px;
        background:
            radial-gradient(ellipse 60% 50% at 55% 35%, rgba(124,58,237,0.04) 0%, transparent 60%),
            radial-gradient(ellipse 45% 45% at 30% 60%, rgba(59,130,246,0.03) 0%, transparent 55%);
        pointer-events: none; z-index: 0;
    }
    .create-home::after {
        content: '';
        position: fixed;
        bottom: -15%; left: 20%;
        width: 700px; height: 500px;
        background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(236,72,153,0.02) 0%, transparent 55%);
        pointer-events: none; z-index: 0;
    }

    /* ==================== 顶部居中标题 ==================== */
    .home-hero-top {
        text-align: center;
        padding: 0 40px;
        position: relative;
        z-index: 1;
        display: flex;
        align-items: flex-end;
        flex: 0.65;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }
    .hero-title {
        font-size: 2rem;
        font-weight: 800;
        color: var(--text-primary);
        line-height: 1.35;
        letter-spacing: -0.02em;
        margin-bottom: 48px;
        width: 100%;
    }
    .hero-title .gradient-word {
        background: linear-gradient(135deg, #c084fc 0%, #818cf8 40%, #22d3ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* ==================== 下方左右分栏 ==================== */
    .home-body {
        display: flex;
        flex-shrink: 0;
        min-height: 0;
        position: relative;
        z-index: 1;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }

    /* ==================== 左侧 ==================== */
    .home-left {
        width: 720px;
        height: 550px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-self: center;
        gap: 16px;
        padding: 8px 24px 0 148px;
        position: relative;
        z-index: 2;
        overflow: visible;
    }
    .home-left::-webkit-scrollbar { width: 3px; }
    .home-left::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.04); border-radius: 2px; }

    .skill-list-label {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 12px;
        letter-spacing: 0.02em;
    }

    .skill-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 0;
    }

    .skill-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        border-radius: 14px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(.4,0,.2,1);
        position: relative;
        overflow: hidden;
    }
    .skill-item::before {
        content: '';
        position: absolute; inset: 0;
        opacity: 0; transition: opacity 0.3s;
        pointer-events: none;
    }
    .skill-item--translate::before { background: radial-gradient(ellipse 80% 70% at 0% 50%, rgba(16,185,129,0.06) 0%, transparent 70%); }
    .skill-item--livestream::before { background: radial-gradient(ellipse 80% 70% at 0% 50%, rgba(249,115,22,0.06) 0%, transparent 70%); }
    .skill-item--generate::before { background: radial-gradient(ellipse 80% 70% at 0% 50%, rgba(168,85,247,0.06) 0%, transparent 70%); }
    .skill-item:hover::before { opacity: 1; }
    .skill-item:hover {
        border-color: rgba(255,255,255,0.12);
        transform: translateX(3px);
        box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    }
    .skill-item--translate:hover { border-color: rgba(16,185,129,0.2); }
    .skill-item--livestream:hover { border-color: rgba(249,115,22,0.2); }
    .skill-item--generate:hover { border-color: rgba(168,85,247,0.2); }
    .skill-item.active { border-color: rgba(99,102,241,0.25); background: rgba(255,255,255,0.04); }
    .skill-item--translate.active { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.03); }
    .skill-item--livestream.active { border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.03); }
    .skill-item--generate.active { border-color: rgba(168,85,247,0.3); background: rgba(168,85,247,0.03); }

    .skill-icon-box {
        width: 88px; height: 50px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        position: relative;
    }
    .skill-icon-box img {
        width: 100%; height: 100%;
        object-fit: cover;
        border-radius: 10px;
        transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .skill-item:hover .skill-icon-box img { transform: scale(1.05); }
    .skill-item--translate .skill-icon-box { background: rgba(16,185,129,0.1); }
    .skill-item--generate .skill-icon-box { background: rgba(168,85,247,0.1); }
    .skill-item--livestream .skill-icon-box { background: rgba(249,115,22,0.1); }

    .skill-item-info { flex: 1; min-width: 0; }
    .skill-item-name {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 3px;
    }
    .skill-item-desc {
        font-size: 0.72rem;
        color: var(--text-muted);
        line-height: 1.4;
    }
    .skill-item-arrow {
        flex-shrink: 0;
        color: var(--text-faint);
        opacity: 0;
        transform: translateX(-4px);
        transition: all 0.25s;
    }
    .skill-item:hover .skill-item-arrow { opacity: 0.5; transform: translateX(0); }

    /* 输入区域 */
    .home-input-wrap {
        width: 100%;
        margin-top: 8px;
    }

    .input-box {
        background: rgba(255,255,255,0.035);
        border: 1.5px solid rgba(255,255,255,0.10);
        border-radius: 20px;
        transition: all 0.35s;
        position: relative;
        box-shadow: 0 6px 32px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .input-box::before {
        content: '';
        position: absolute;
        top: -1px; left: 15%; right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent);
        opacity: 0; transition: opacity 0.4s;
        pointer-events: none; z-index: 2;
    }
    .input-box:focus-within::before { opacity: 1; }
    .input-box:focus-within {
        border-color: rgba(99,102,241,0.25);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.04), 0 8px 32px rgba(99,102,241,0.06);
        background: rgba(255,255,255,0.035);
    }

    .attach-bar { padding: 10px 14px 0; }
    .attach-bar:empty { display: none; }
    .attach-tag {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 10px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        font-size: 0.75rem; color: var(--text-secondary);
    }
    .attach-tag-icon { flex-shrink: 0; font-size: 0.8rem; }
    .attach-tag-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .attach-tag-meta { font-size: 0.62rem; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
    .attach-tag-remove {
        display: flex; align-items: center; justify-content: center;
        width: 16px; height: 16px; border-radius: 4px;
        border: none; background: none; color: var(--text-faint); cursor: pointer; transition: all 0.15s;
    }
    .attach-tag-remove:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .attach-guide {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 12px; border-radius: 10px;
        font-size: 0.75rem; font-weight: 500;
        cursor: pointer; transition: all 0.2s;
        animation: guideSlideIn 0.35s cubic-bezier(.4,0,.2,1);
        border: 1.5px dashed; user-select: none;
    }
    @keyframes guideSlideIn {
        0% { opacity: 0; transform: translateY(-4px) scale(0.97); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .attach-guide-icon { font-size: 0.85rem; }
    .attach-guide-text { line-height: 1; }
    .attach-guide-arrow { margin-left: auto; opacity: 0.4; font-size: 0.6rem; transition: transform 0.2s, opacity 0.2s; }
    .attach-guide:hover .attach-guide-arrow { opacity: 0.7; transform: translateX(2px); }
    .attach-guide--translate { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.25); color: #34d399; }
    .attach-guide--translate:hover { background: rgba(16,185,129,0.12); }
    .attach-guide--livestream { background: rgba(249,115,22,0.06); border-color: rgba(249,115,22,0.25); color: #fb923c; }
    .attach-guide--livestream:hover { background: rgba(249,115,22,0.12); }

    .input-textarea {
        width: 100%;
        min-height: 72px; max-height: 140px;
        padding: 16px 20px 8px;
        background: transparent; border: none;
        color: var(--text-primary);
        font-size: 0.9rem; font-family: inherit;
        outline: none; resize: none; line-height: 1.6;
    }
    .input-textarea::placeholder { color: var(--text-faint); }

    /* contenteditable 富文本输入区 */
    .input-rich {
        width: 100%;
        min-height: 72px; max-height: 140px;
        padding: 16px 20px 8px;
        background: transparent; border: none;
        color: var(--text-primary);
        font-size: 0.9rem; font-family: inherit;
        outline: none; line-height: 1.85;
        overflow-y: auto; overflow-x: hidden;
        white-space: pre-wrap; word-break: break-word;
        cursor: text;
    }
    .input-rich:empty::before {
        content: attr(data-placeholder);
        color: var(--text-faint);
        pointer-events: none;
    }
    /* 模板已渲染时隐藏 placeholder */
    .input-rich.has-template:empty::before { content: none; }

    /* 内联下拉胶囊 */
    .prompt-drop {
        display: inline-flex; align-items: center; gap: 3px;
        padding: 2px 10px; margin: 0 2px;
        font-size: 0.85rem; font-weight: 600;
        color: #c4b5fd; background: rgba(139,92,246,0.14);
        border: 1px solid rgba(139,92,246,0.25);
        border-radius: 100px; cursor: pointer;
        user-select: none; vertical-align: baseline;
        transition: all 0.2s; position: relative;
        line-height: 1.6;
        font-family: inherit;
    }
    .prompt-drop:hover {
        background: rgba(139,92,246,0.22);
        border-color: rgba(139,92,246,0.4);
        color: #ddd6fe;
    }
    .prompt-drop .pd-arrow {
        font-size: 0.5rem; opacity: 0.6;
        transition: transform 0.2s;
    }
    .prompt-drop.open .pd-arrow { transform: rotate(180deg); }

    /* ---- 可编辑占位符块 ---- */
    .prompt-editable {
        display: inline-block; min-width: 80px; max-width: 260px;
        padding: 2px 8px; margin: 0 2px;
        border-bottom: 1.5px dashed rgba(255,255,255,0.25);
        color: var(--text-primary, #fff); font-weight: 500;
        outline: none; transition: border-color 0.2s;
    }
    .prompt-editable:empty::before {
        content: attr(data-placeholder);
        color: rgba(255,255,255,0.3); font-weight: 400; pointer-events: none;
    }
    .prompt-editable:focus { border-bottom-color: rgba(168,85,247,0.6); }
    .prompt-editable[data-theme="translate"]:focus { border-bottom-color: rgba(16,185,129,0.6); }
    .prompt-editable[data-theme="livestream"]:focus { border-bottom-color: rgba(249,115,22,0.6); }
    .prompt-editable[data-theme="generate"]:focus { border-bottom-color: rgba(168,85,247,0.6); }
    [data-theme="light"] .prompt-editable { border-bottom-color: rgba(0,0,0,0.15); color: var(--text-primary); }
    [data-theme="light"] .prompt-editable:empty::before { color: rgba(0,0,0,0.3); }
    [data-theme="light"] .prompt-editable:focus { border-bottom-color: rgba(168,85,247,0.5); }
    [data-theme="light"] .prompt-editable[data-theme="translate"]:focus { border-bottom-color: rgba(16,185,129,0.5); }
    [data-theme="light"] .prompt-editable[data-theme="generate"]:focus { border-bottom-color: rgba(168,85,247,0.5); }

    /* 按 skill 主题色区分 */
    .prompt-drop[data-theme="translate"] { color: #6ee7b7; background: rgba(16,185,129,0.14); border-color: rgba(16,185,129,0.3); }
    .prompt-drop[data-theme="translate"]:hover { background: rgba(16,185,129,0.22); border-color: rgba(16,185,129,0.45); color: #a7f3d0; }
    .prompt-drop[data-theme="livestream"] { color: #fdba74; background: rgba(249,115,22,0.14); border-color: rgba(249,115,22,0.3); }
    .prompt-drop[data-theme="livestream"]:hover { background: rgba(249,115,22,0.22); border-color: rgba(249,115,22,0.45); color: #fed7aa; }
    .prompt-drop[data-theme="generate"] { color: #d8b4fe; background: rgba(168,85,247,0.14); border-color: rgba(168,85,247,0.3); }
    .prompt-drop[data-theme="generate"]:hover { background: rgba(168,85,247,0.22); border-color: rgba(168,85,247,0.45); color: #e9d5ff; }
    .prompt-drop[data-theme="erase"] { color: #67e8f9; background: rgba(6,182,212,0.14); border-color: rgba(6,182,212,0.3); }
    .prompt-drop[data-theme="erase"]:hover { background: rgba(6,182,212,0.22); border-color: rgba(6,182,212,0.45); color: #a5f3fc; }
    .prompt-drop[data-theme="subtitle"] { color: #7dd3fc; background: rgba(56,189,248,0.14); border-color: rgba(56,189,248,0.3); }
    .prompt-drop[data-theme="subtitle"]:hover { background: rgba(56,189,248,0.22); border-color: rgba(56,189,248,0.45); color: #bae6fd; }
    .prompt-drop[data-theme="voiceover"] { color: #a5b4fc; background: rgba(99,102,241,0.14); border-color: rgba(99,102,241,0.3); }
    .prompt-drop[data-theme="voiceover"]:hover { background: rgba(99,102,241,0.22); border-color: rgba(99,102,241,0.45); color: #c7d2fe; }

    /* 内联下拉菜单 — fixed 定位，不受父级 overflow 裁剪 */
    .pd-menu {
        position: fixed;
        min-width: 100px; background: rgba(15,15,26,0.96);
        backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; padding: 4px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.45);
        z-index: 9999; opacity: 0; visibility: hidden;
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
        white-space: nowrap;
    }
    .pd-menu.show { opacity: 1; visibility: visible; }
    .pd-menu-item {
        display: block; width: 100%; padding: 5px 12px;
        font-size: 0.72rem; font-weight: 500; color: var(--text-muted);
        background: none; border: none; border-radius: 6px;
        cursor: pointer; transition: all 0.12s; text-align: left;
        font-family: inherit;
    }
    .pd-menu-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
    .pd-menu-item.selected { color: #a78bfa; background: rgba(99,102,241,0.08); }

    .input-toolbar {
        display: flex; align-items: center; gap: 4px;
        padding: 6px 12px 10px;
    }
    .input-left { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .toolbar-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
    .toolbar-center { flex: 1; min-width: 0; }
    .input-submit-wrap { flex-shrink: 0; margin-left: auto; }
    .input-icon-btn {
        display: flex; align-items: center; justify-content: center;
        width: 30px; height: 30px; border-radius: 8px;
        border: none; background: transparent;
        color: var(--text-faint); cursor: pointer; transition: all 0.2s;
    }
    .input-icon-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.06); }
    .input-submit-btn {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; margin-left: auto;
        border-radius: 10px; border: none;
        background: linear-gradient(135deg, rgba(124,58,237,0.7), rgba(79,70,229,0.7));
        color: #fff; cursor: pointer; transition: all 0.3s cubic-bezier(.4,0,.2,1);
    }
    .input-submit-btn:hover {
        background: linear-gradient(135deg, rgba(124,58,237,0.9), rgba(79,70,229,0.9));
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }
    .input-submit-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

    /* Config capsules */
    .config-bar { display: flex; flex-wrap: nowrap; align-items: center; gap: 4px; position: relative; overflow: visible; }
    .config-bar:empty { display: none; }
    .cfg-capsule {
        position: relative; display: inline-flex; align-items: center; gap: 3px;
        padding: 3px 8px; font-size: 0.65rem; font-weight: 500;
        color: var(--text-muted); background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07); border-radius: 100px;
        cursor: pointer; transition: all 0.2s; font-family: inherit; user-select: none;
    }
    .cfg-capsule:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.16); background: rgba(255,255,255,0.06); }
    .cfg-capsule.modified { border-color: rgba(99,102,241,0.3); color: var(--text-primary); background: rgba(99,102,241,0.06); }
    .cfg-capsule.modified[data-theme="translate"] { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06); color: #34d399; }
    .cfg-capsule.modified[data-theme="livestream"] { border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.06); color: #fb923c; }
    .cfg-capsule.modified[data-theme="generate"] { border-color: rgba(168,85,247,0.3); background: rgba(168,85,247,0.06); color: #c084fc; }
    .cfg-value { font-weight: 600; }
    .cfg-arrow { font-size: 0.45rem; opacity: 0.45; transition: transform 0.2s; }
    .cfg-capsule.open .cfg-arrow { transform: rotate(180deg); }
    .cfg-dropdown {
        position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
        min-width: 90px; background: rgba(15,15,26,0.96);
        backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; padding: 4px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.4); z-index: 100;
        opacity: 0; visibility: hidden; transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .cfg-dropdown.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .cfg-drop-item {
        display: block; width: 100%; padding: 5px 10px;
        font-size: 0.65rem; font-weight: 500; color: var(--text-muted);
        background: none; border: none; border-radius: 6px;
        cursor: pointer; transition: all 0.12s; text-align: left;
        white-space: nowrap; font-family: inherit;
    }
    .cfg-drop-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
    .cfg-drop-item.selected { color: #a78bfa; background: rgba(99,102,241,0.08); }

    .skill-tag {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 4px 10px; font-size: 0.72rem; font-weight: 600;
        border-radius: 100px; cursor: pointer; transition: all 0.25s;
        white-space: nowrap; user-select: none; flex-shrink: 0;
    }
    .skill-tag-icon { font-size: 0.78rem; }
    .skill-tag-name { line-height: 1; }
    .skill-tag-action {
        display: inline-flex; align-items: center; justify-content: center;
        width: 14px; height: 14px; border-radius: 50%;
        font-size: 0.55rem; border: none; background: transparent;
        color: inherit; cursor: pointer; transition: all 0.15s;
        padding: 0; opacity: 0.7;
    }
    .skill-tag-action:hover { opacity: 1; transform: scale(1.15); }
    .skill-tag--confirmed.skill-tag--translate { background: rgba(16,185,129,0.14); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .skill-tag--confirmed.skill-tag--livestream { background: rgba(249,115,22,0.14); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
    .skill-tag--confirmed.skill-tag--generate { background: rgba(168,85,247,0.14); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
    .skill-tag--confirmed.skill-tag--erase { background: rgba(6,182,212,0.14); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }
    .skill-tag--confirmed.skill-tag--subtitle { background: rgba(56,189,248,0.14); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); }
    .skill-tag--confirmed.skill-tag--voiceover { background: rgba(99,102,241,0.14); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
    .skill-tag--pending { border-style: dashed !important; opacity: 0.85; }
    .skill-tag--pending.skill-tag--translate { background: rgba(16,185,129,0.08); color: #34d399; border: 1.5px dashed rgba(16,185,129,0.35); }
    .skill-tag--pending.skill-tag--livestream { background: rgba(249,115,22,0.08); color: #fb923c; border: 1.5px dashed rgba(249,115,22,0.35); }
    .skill-tag--pending.skill-tag--generate { background: rgba(168,85,247,0.08); color: #c084fc; border: 1.5px dashed rgba(168,85,247,0.35); }
    .skill-tag--pending.skill-tag--erase { background: rgba(6,182,212,0.08); color: #22d3ee; border: 1.5px dashed rgba(6,182,212,0.35); }
    .skill-tag--pending.skill-tag--subtitle { background: rgba(56,189,248,0.08); color: #38bdf8; border: 1.5px dashed rgba(56,189,248,0.35); }
    .skill-tag--pending.skill-tag--voiceover { background: rgba(99,102,241,0.08); color: #818cf8; border: 1.5px dashed rgba(99,102,241,0.35); }
    .skill-tag--placeholder {
        background: rgba(255,255,255,0.04); color: var(--text-faint);
        border: 1.5px dashed rgba(255,255,255,0.12); position: relative;
    }
    .skill-tag--placeholder:hover { background: rgba(255,255,255,0.07); color: var(--text-secondary); border-color: rgba(255,255,255,0.2); }
    .skill-tag--placeholder .skill-tag-icon { font-size: 0.72rem; opacity: 0.6; }
    .skill-tag--placeholder .skill-tag-name { opacity: 0.8; }
    .skill-tag--placeholder .skill-tag-arrow { font-size: 0.6rem; opacity: 0.5; transition: transform 0.2s; margin-left: 1px; }
    .skill-tag--placeholder:hover .skill-tag-arrow { transform: translateY(1px); opacity: 0.8; }
    /* 选择技能下拉 */
    .skill-picker-drop {
        display: none; position: absolute; bottom: calc(100% + 6px); left: 0;
        background: #1e1e2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
        padding: 4px; min-width: 140px; z-index: 100;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .skill-picker-drop.show { display: block; }
    .skill-picker-item {
        display: flex; align-items: center; gap: 6px; padding: 7px 10px;
        border-radius: 7px; cursor: pointer; font-size: 0.72rem; color: var(--text-secondary);
        border: none; background: none; width: 100%; text-align: left; transition: all 0.15s;
    }
    .skill-picker-item:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
    .skill-picker-item-icon { font-size: 0.82rem; }
    .skill-picker-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 8px; }
    .skill-picker-label { padding: 4px 10px 2px; font-size: 0.58rem; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
    .skill-tag-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

    .nudge-toast {
        position: absolute; bottom: calc(100% + 10px); left: 50%;
        transform: translateX(-50%) translateY(8px);
        padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 500;
        color: #fff; white-space: nowrap; pointer-events: none;
        opacity: 0; transition: all 0.35s cubic-bezier(.4,0,.2,1);
        z-index: 50; display: flex; align-items: center; gap: 8px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }
    .nudge-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .nudge-toast--translate { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); backdrop-filter: blur(16px); }
    .nudge-toast--livestream { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); backdrop-filter: blur(16px); }
    .nudge-toast-icon { font-size: 0.9rem; }
    .nudge-toast-text { color: rgba(255,255,255,0.9); }
    .nudge-toast-btn {
        padding: 3px 10px; border-radius: 6px; border: none;
        font-size: 0.68rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .nudge-toast--translate .nudge-toast-btn { background: rgba(16,185,129,0.25); color: #34d399; }
    .nudge-toast--livestream .nudge-toast-btn { background: rgba(249,115,22,0.25); color: #fb923c; }
    .input-box.shake { animation: inputShake 0.45s cubic-bezier(.36,.07,.19,.97); }
    @keyframes inputShake {
        0%,100% { transform: translateX(0); }
        20% { transform: translateX(-5px); } 40% { transform: translateX(5px); }
        60% { transform: translateX(-3px); } 80% { transform: translateX(3px); }
    }

    /* ==================== 右侧：角色群像展示 ==================== */
    .home-right {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        overflow: visible;
        padding: 0 24px 0 32px;
    }

    /* 合影容器 */
    .crew-group-photo {
        position: relative;
        z-index: 2;
        max-width: 456px;
        width: 100%;
        aspect-ratio: 1 / 1;
    }
    .crew-photo-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
        display: block;
        filter: drop-shadow(0 12px 32px rgba(0,0,0,0.25));
        transition: filter 0.4s, opacity 0.4s ease;
    }
    .crew-photo-skill,
    .crew-photo-translate,
    .crew-photo-solo {
        position: absolute;
        top: 0; left: 0;
        opacity: 0;
    }
    .crew-group-photo.skill-active .crew-photo-default { opacity: 0; }
    .crew-group-photo.skill-active .crew-photo-skill { display: block !important; opacity: 1; }
    /* 选中影视译制时 → 显示4人译制配图，隐藏通用合影 */
    .crew-group-photo.skill-translate { max-width: 380px; }
    .crew-group-photo.skill-translate .crew-photo-skill { opacity: 0 !important; }
    .crew-group-photo.skill-translate .crew-photo-translate { display: block !important; opacity: 1 !important; }
    /* 选中影视译制时：隐藏 7 人热区，显示 4 人热区 */
    .crew-group-photo.skill-translate .crew-hotspot-7 { display: none !important; }
    .crew-hotspot-4 { display: none; }
    .crew-group-photo.skill-translate .crew-hotspot-4 { display: block !important; }
    /* 选中子技能（单人模式）→ 显示对应角色 3D 图，隐藏其余 */
    .crew-group-photo.skill-solo { max-width: 300px; }
    .crew-group-photo.skill-solo .crew-photo-skill { opacity: 0 !important; }
    .crew-group-photo.skill-solo .crew-hotspot-7,
    .crew-group-photo.skill-solo .crew-hotspot-4 { display: none !important; }
    .crew-group-photo.skill-erase .crew-photo-erase { display: block !important; opacity: 1 !important; }
    .crew-group-photo.skill-subtitle .crew-photo-subtitle { display: block !important; opacity: 1 !important; }
    .crew-group-photo.skill-voiceover .crew-photo-voiceover { display: block !important; opacity: 1 !important; }
    .crew-group-photo:hover .crew-photo-img {
        filter: drop-shadow(0 16px 40px rgba(0,0,0,0.35));
    }

    /* 底部地面光影（极淡） */
    .crew-group-photo::after {
        content: '';
        position: absolute;
        bottom: -4px; left: 15%; right: 15%;
        height: 30px;
        background: radial-gradient(ellipse at center, rgba(124,58,237,0.05) 0%, transparent 70%);
        pointer-events: none;
        filter: blur(10px);
    }

    /* 角色热区 */
    .crew-hotspot {
        position: absolute;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s cubic-bezier(.4,0,.2,1);
        z-index: 3;
    }
    .crew-hotspot:hover {
        background: transparent;
        box-shadow: none;
    }
    .crew-hotspot:active {
        background: transparent;
    }

    /* 热区浮动名牌 */
    .crew-hotspot-label {
        position: absolute;
        bottom: -2px; left: 50%;
        transform: translateX(-50%) translateY(100%);
        background: rgba(15,15,26,0.92);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        padding: 5px 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s cubic-bezier(.4,0,.2,1);
        z-index: 20;
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        text-align: center;
    }
    .crew-hotspot:hover .crew-hotspot-label {
        opacity: 1;
        transform: translateX(-50%) translateY(calc(100% + 4px));
    }
    .crew-hotspot-name {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-primary);
        display: block;
    }
    .crew-hotspot-role {
        font-size: 0.58rem;
        color: var(--text-muted);
        display: block;
        margin-top: 1px;
    }

    /* ===== 角色详情面板 ===== */
    .char-detail-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        z-index: 200;
        opacity: 0; pointer-events: none;
        transition: opacity 0.3s;
    }
    .char-detail-overlay.show { opacity: 1; pointer-events: auto; }

    .char-detail-panel {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        width: min(480px, 90vw);
        max-height: 80vh;
        background: rgba(15,15,26,0.97);
        backdrop-filter: blur(28px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        z-index: 201;
        opacity: 0; pointer-events: none;
        transition: all 0.35s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 32px 80px rgba(0,0,0,0.6);
        overflow: hidden;
    }
    .char-detail-panel.show {
        opacity: 1; pointer-events: auto;
        transform: translate(-50%, -50%) scale(1);
    }

    .char-detail-close {
        position: absolute;
        top: 16px; right: 16px;
        width: 32px; height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.06);
        color: var(--text-muted);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.2s; z-index: 5;
    }
    .char-detail-close:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

    .char-detail-hero {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 28px 28px 0;
    }
    .char-detail-avatar {
        width: 80px; height: 80px;
        border-radius: 16px;
        overflow: hidden;
        flex-shrink: 0;
        border: 2px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.02);
    }
    .char-detail-avatar img {
        width: 100%; height: 100%;
        object-fit: cover;
    }
    .char-detail-meta { flex: 1; min-width: 0; }
    .char-detail-name {
        font-size: 1.15rem;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 4px;
    }
    .char-detail-title {
        font-size: 0.72rem;
        font-weight: 600;
        margin-bottom: 6px;
    }
    .char-detail-title--director { color: #3b82f6; }
    .char-detail-title--postprod { color: #a855f7; }
    .char-detail-title--translator { color: #6366f1; }
    .char-detail-title--voice { color: #ec4899; }
    .char-detail-title--producer { color: #ef4444; }
    .char-detail-title--screenwriter { color: #f59e0b; }
    .char-detail-title--artdirector { color: #06b6d4; }
    .char-detail-motto {
        font-size: 0.7rem;
        color: var(--text-muted);
        font-style: italic;
        line-height: 1.5;
    }

    .char-detail-divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin: 16px 28px 0;
    }

    .char-detail-body {
        padding: 16px 28px 28px;
        overflow-y: auto;

        /* ===== 渲染提示词模板到富文本输入区 ===== */
        function renderPromptTemplate(sk) {
            var s = skills[sk];
            var tpl = s.promptTemplate;
            if (!tpl || !tpl.length) {
                inputEl.innerHTML = '';
                inputEl.classList.remove('has-template');
                inputEl.setAttribute('data-placeholder', s.placeholder);
                inputEl.focus();
                return;
            }
            inputEl.innerHTML = '';
            inputEl.classList.add('has-template');
            var theme = s.cssClass;

            tpl.forEach(function(seg) {
                if (seg.type === 'text') {
                    inputEl.appendChild(document.createTextNode(seg.value));
                } else if (seg.type === 'inline') {
                    var cfg = s.config.find(function(c) { return c.key === seg.configKey; });
                    if (!cfg) return;
                    // 创建内联下拉胶囊
                    var span = document.createElement('span');
                    span.className = 'prompt-drop';
                    span.setAttribute('contenteditable', 'false');
                    span.setAttribute('data-key', cfg.key);
                    span.setAttribute('data-theme', theme);

                    var valSpan = document.createElement('span');
                    valSpan.className = 'pd-value';
                    valSpan.textContent = cfg.options[0].text;
                    span.appendChild(valSpan);

                    var arrow = document.createElement('span');
                    arrow.className = 'pd-arrow';
                    arrow.textContent = '▾';
                    span.appendChild(arrow);

                    // 构建下拉菜单
                    var menu = document.createElement('div');
                    menu.className = 'pd-menu';
                    cfg.options.forEach(function(opt, idx) {
                        var btn = document.createElement('button');
                        btn.className = 'pd-menu-item' + (idx === 0 ? ' selected' : '');
                        btn.setAttribute('data-value', opt.value);
                        btn.setAttribute('data-text', opt.text);
                        btn.textContent = opt.text;
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            e.preventDefault();
                            configValues[cfg.key] = opt.value;
                            valSpan.textContent = opt.text;
                            menu.querySelectorAll('.pd-menu-item').forEach(function(b) { b.classList.remove('selected'); });
                            btn.classList.add('selected');
                            menu.classList.remove('show');
                            span.classList.remove('open');
                            // 同步更新底部 toolbar 对应的 capsule（如果存在）
                            syncToolbarCapsule(cfg.key, opt.value, opt.text);
                        });
                        menu.appendChild(btn);
                    });
                    span.appendChild(menu);

                    // 点击胶囊切换菜单（fixed 定位，避免 overflow 裁剪）
                    span.addEventListener('click', function(e) {
                        e.stopPropagation();
                        e.preventDefault();
                        var isOpen = menu.classList.contains('show');
                        closeAllInlineDrops();
                        if (!isOpen) {
                            menu.classList.add('show');
                            span.classList.add('open');
                            // 计算 fixed 位置：胶囊上方居中
                            var rect = span.getBoundingClientRect();
                            var menuW = menu.offsetWidth || 100;
                            var left = rect.left + rect.width / 2 - menuW / 2;
                            // 防止超出左右屏幕
                            if (left < 8) left = 8;
                            if (left + menuW > window.innerWidth - 8) left = window.innerWidth - 8 - menuW;
                            menu.style.left = left + 'px';
                            menu.style.top = (rect.top - 6) + 'px';
                            menu.style.transform = 'translateY(-100%)';
                        }
                    });

                    inputEl.appendChild(span);
                } else if (seg.type === 'editable') {
                    // 可编辑占位符块 — 用户直接在此输入内容
                    var editSpan = document.createElement('span');
                    editSpan.className = 'prompt-editable';
                    editSpan.setAttribute('contenteditable', 'true');
                    editSpan.setAttribute('data-placeholder', seg.placeholder || '输入内容…');
                    editSpan.setAttribute('data-theme', theme);
                    inputEl.appendChild(editSpan);
                }
            });

            // 如果有 editable 块，把光标放入其中；否则放到末尾
            var editBlock = inputEl.querySelector('.prompt-editable');
            if (editBlock) {
                editBlock.focus();
                placeCaretAtEnd(editBlock);
            } else {
                placeCaretAtEnd(inputEl);
            }
        }

        function placeCaretAtEnd(el) {
            el.focus();
            if (window.getSelection && document.createRange) {
                var range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(false);
                var sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        function closeAllInlineDrops() {
            document.querySelectorAll('.pd-menu.show').forEach(function(m) { m.classList.remove('show'); });
            document.querySelectorAll('.prompt-drop.open').forEach(function(s) { s.classList.remove('open'); });
        }

        // 同步内联下拉 → 底部 toolbar capsule
        function syncToolbarCapsule(key, value, text) {
            var cap = configBar.querySelector('.cfg-capsule[data-key="' + key + '"]');
            if (!cap) return;
            cap.querySelector('.cfg-value').textContent = text;
            cap.querySelectorAll('.cfg-drop-item').forEach(function(d) {
                d.classList.toggle('selected', d.dataset.value === value);
            });
            var def = detectedSkill && skills[detectedSkill].config.find(function(c) { return c.key === key; });
            cap.classList.toggle('modified', def && value !== def.options[0].value);
        }

        // 同步底部 toolbar capsule → 内联下拉
        function syncInlineDrop(key, value, text) {
            var drop = inputEl.querySelector('.prompt-drop[data-key="' + key + '"]');
            if (!drop) return;
            drop.querySelector('.pd-value').textContent = text;
            drop.querySelectorAll('.pd-menu-item').forEach(function(b) {
                b.classList.toggle('selected', b.dataset.value === value);
            });
        }

        // 从富文本输入区提取纯文本 prompt
        function extractPromptText() {
            // 将内联下拉胶囊替换为其当前选中值文本
            var clone = inputEl.cloneNode(true);
            clone.querySelectorAll('.prompt-drop').forEach(function(drop) {
                var valEl = drop.querySelector('.pd-value');
                var textNode = document.createTextNode(valEl ? valEl.textContent : '');
                drop.parentNode.replaceChild(textNode, drop);
            });
            return (clone.innerText || clone.textContent || '').trim();
        }

        function renderConfig(sk) {

            var sk = detectedSkill || 'translate';
            var needsVideo = ['translate','erase','subtitle','voiceover'];
            if (needsVideo.indexOf(sk) !== -1 && !uploadedFile) { showNudge('translate','📹','请先上传视频文件','上传视频',triggerUpload); return; }
            if (sk === 'livestream' && !liveLink) { showNudge('livestream','🔗','请先添加直播链接','添加链接',function(){}); return; }
            goToSkill(sk);
        }
        function goToSkill(sk) {
            var text = extractPromptText();
            var url = skills[sk].url;
            var params = ['autostart=1'];
            // 子功能映射到 translate-v7.html 的 mode 参数
            var modeMap = { erase: 'erase', subtitle: 'subtitle', voiceover: 'voice' };
            if (modeMap[sk]) params.push('mode=' + modeMap[sk]);
            if (text) params.push('prompt=' + encodeURIComponent(text));
            Object.keys(configValues).forEach(function(k) { params.push(k + '=' + encodeURIComponent(configValues[k])); });
            if (uploadedFile) { sessionStorage.setItem('tideo_pending_file', JSON.stringify({ name: uploadedFile.name, size: uploadedFile.size, type: uploadedFile.type })); }
            sessionStorage.setItem('tideo_tasks', JSON.stringify({ skill: sk, config: configValues, prompt: text }));
            if (params.length) url += '?' + params.join('&');
            window.location.href = url;
        }
        function showNudge(type, icon, text, btnText, btnAction) {
            nudgeToast.className = 'nudge-toast nudge-toast--' + type;
            document.getElementById('nudgeIcon').textContent = icon;
            document.getElementById('nudgeText').textContent = text;
            var nb = document.getElementById('nudgeBtn');
            nb.textContent = btnText;
            nb.onclick = function(e) { e.stopPropagation(); nudgeToast.classList.remove('show'); btnAction(); };
            inputBox.classList.remove('shake'); void inputBox.offsetWidth; inputBox.classList.add('shake');
            nudgeToast.classList.add('show');
            setTimeout(function() { nudgeToast.classList.remove('show'); }, 5000);
        }
        function triggerUpload() {
            nudgeToast.classList.remove('show');
            var fi = document.createElement('input');
            fi.type = 'file'; fi.accept = 'video/*,.mp4,.mov,.avi,.mkv';
            fi.onchange = function(e) { var f = e.target.files[0]; if (!f) return; uploadedFile = f; refImage = null; liveLink = ''; renderAttachBar(); inputEl.focus(); };
            fi.click();
        }
        uploadBtnEl.addEventListener('click', function() {
            nudgeToast.classList.remove('show');
            var fi = document.createElement('input');
            fi.type = 'file'; fi.accept = 'video/*,image/*,.mp4,.mov,.avi,.mkv';
            fi.onchange = function(e) { var f = e.target.files[0]; if (!f) return;
                if (f.type.startsWith('image/')) { refImage = f; uploadedFile = null; } else { uploadedFile = f; refImage = null; }
                liveLink = ''; renderAttachBar();
            }; fi.click();
        });
        function renderAttachBar() {
            attachBar.innerHTML = '';
            if (uploadedFile) {
                var sizeMB = (uploadedFile.size / 1048576).toFixed(1);
                attachBar.innerHTML = '<div class="attach-tag"><span class="attach-tag-icon">🎬</span><span class="attach-tag-name">' + esc(uploadedFile.name) + '</span><span class="attach-tag-meta">' + sizeMB + ' MB</span><button class="attach-tag-remove" id="rmAttach"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>';
                document.getElementById('rmAttach').onclick = function() { uploadedFile = null; renderAttachBar(); };
            } else if (['translate','erase','subtitle','voiceover'].indexOf(detectedSkill) !== -1) {
                attachBar.innerHTML = '<div class="attach-guide attach-guide--translate" id="guideAddVideo"><span class="attach-guide-icon">📹</span><span class="attach-guide-text">点击添加视频文件</span><span class="attach-guide-arrow">→</span></div>';
                document.getElementById('guideAddVideo').onclick = triggerUpload;
            } else if (detectedSkill === 'livestream') {
                attachBar.innerHTML = '<div class="attach-guide attach-guide--livestream" id="guideAddLink"><span class="attach-guide-icon">🔗</span><span class="attach-guide-text">点击添加直播链接</span><span class="attach-guide-arrow">→</span></div>';
            }
        }
        function esc(s) { var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
        /* 初始化：显示技能占位胶囊 */
        renderSkillTag();
    })();
    </script>

    <script>
    (function() {
        var avatar = document.getElementById('userAvatar');
        var avatarLetter = document.getElementById('userAvatarLetter');
        var dropdown = document.getElementById('userDropdown');
        var dropdownAvatar = document.getElementById('dropdownAvatar');
        var dropdownName = document.getElementById('dropdownName');
        var dropdownHint = document.getElementById('dropdownHint');
        var loginBtn = document.getElementById('userLoginBtn');
        var logoutBtn = document.getElementById('userLogoutBtn');
        function updateUserUI() {
            var raw = localStorage.getItem('tideo_user');
            if (raw) {
                try {
                    var user = JSON.parse(raw);
                    var initial = user.avatar || user.name.charAt(0).toUpperCase();
                    avatarLetter.textContent = initial;
                    dropdownAvatar.textContent = initial;
                    dropdownName.textContent = user.name;
                    dropdownHint.textContent = '已登录';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'flex';
                } catch(e) {}
            } else {
                avatarLetter.textContent = 'U';
                dropdownAvatar.textContent = 'U';
                dropdownName.textContent = '未登录';
                dropdownHint.textContent = '点击登录';
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
            }
        }
        avatar.addEventListener('click', function(e) { e.stopPropagation(); dropdown.classList.toggle('show'); });
        document.addEventListener('click', function(e) { if (!dropdown.contains(e.target) && e.target !== avatar) dropdown.classList.remove('show'); });
        loginBtn.addEventListener('click', function(e) { e.preventDefault(); window.location.href = 'login.html'; });
        logoutBtn.addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('tideo_user'); updateUserUI(); dropdown.classList.remove('show'); });
        updateUserUI();
        window.addEventListener('storage', function(e) { if (e.key === 'tideo_user') updateUserUI(); });
    })();
    </script>
    <!-- 主题切换 -->
    <script>
    (function() {
        var STORAGE_KEY = 'tideo_theme';
        var html = document.documentElement;

        // 页面加载时恢复保存的主题
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved === 'dark') {
            html.removeAttribute('data-theme');
        } else if (saved === 'light') {
            html.setAttribute('data-theme', 'light');
        }
        // 也检查系统偏好（如果没有手动设置过）
        if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            html.setAttribute('data-theme', 'light');
        }

        var btn = document.getElementById('themeToggleBtn');
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var current = html.getAttribute('data-theme');
                if (current === 'light') {
                    html.removeAttribute('data-theme');
                    localStorage.setItem(STORAGE_KEY, 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    localStorage.setItem(STORAGE_KEY, 'light');
                }
            });
        }
    })();
    </script>

    <div class="minimized-tasks-bar" id="minimizedTasksBar"></div>

    <script>
    // ===== 最小化任务胶囊渲染 =====
    (function() {
        var bar = document.getElementById('minimizedTasksBar');
        if (!bar) return;

        var AVATARS = [
            'assets/characters/linyuchen-director.png',
            'assets/characters/chenmo-postprod.png',
            'assets/characters/limingyuan-translator.png',
            'assets/characters/suya-voice.png'
        ];

        function loadTasks() {
            try {
                return JSON.parse(sessionStorage.getItem('tideo_minimized_tasks') || '[]');
            } catch(e) { return []; }
        }

        function saveTasks(tasks) {
            try { sessionStorage.setItem('tideo_minimized_tasks', JSON.stringify(tasks)); } catch(e) {}
        }

        function render() {
            var tasks = loadTasks();
            if (tasks.length === 0) {
                bar.classList.remove('visible');
                bar.innerHTML = '';
                return;
            }
            bar.classList.add('visible');

            // 后台处理模拟：更新 processing 状态
            tasks.forEach(function(t) {
                if (t.phase === 'processing') {
                    t.progress = Math.min((t.progress || 0) + Math.round(Math.random() * 8 + 2), 100);
                    if (t.progress < 30) t.progressStep = '正在擦除字幕...';
                    else if (t.progress < 60) t.progressStep = '正在翻译字幕...';
                    else if (t.progress < 85) t.progressStep = '正在生成配音...';
                    else if (t.progress < 100) t.progressStep = '正在合成视频...';
                    if (t.progress >= 100) {
                        t.phase = 'done';
                        t.progress = 100;
                        t.progressStep = '译制完成！';
                    }
                }
            });
            saveTasks(tasks);

            bar.innerHTML = tasks.map(function(task) {
                var isDone = task.phase === 'done';
                var isProcessing = task.phase === 'processing';
                var cardClass = isDone ? 'task-done' : (isProcessing ? 'task-processing' : '');

                var statusText;
                if (isDone) {
                    statusText = '可以看成片 <span class="mt-link-arrow">↗</span>';
                } else if (isProcessing) {
                    statusText = task.progressStep || '干活中...';
                } else {
                    statusText = '配置中...';
                }

                var avatarHtml = AVATARS.map(function(src) {
                    return '<img src="' + src + '" alt="">';
                }).join('');

                return '<div class="min-task-card ' + cardClass + '" data-task-id="' + task.id + '">' +
                    '<div class="mt-avatar-stack">' + avatarHtml + '</div>' +
                    '<div class="mt-text">' +
                        '<span class="mt-name">视频译制工作小组（4）</span>' +
                        '<span class="mt-status">' + statusText + '</span>' +
                    '</div>' +
                    '<button class="mt-close" data-dismiss="' + task.id + '" title="关闭任务"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M3 3L11 11M11 3L3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>' +
                '</div>';
            }).join('');

            // 绑定点击 → 恢复任务（跳回译制页）
            bar.querySelectorAll('.min-task-card').forEach(function(card) {
                card.addEventListener('click', function(e) {
                    if (e.target.closest('.mt-close')) return;
                    var taskId = card.dataset.taskId;
                    // 清除该任务
                    var tasks = loadTasks().filter(function(t) { return t.id !== taskId; });
                    saveTasks(tasks);
                    window.location.href = 'translate-v7.html?restore=' + taskId;
                });
            });

            // 绑定关闭
            bar.querySelectorAll('[data-dismiss]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var taskId = btn.dataset.dismiss;
                    var tasks = loadTasks().filter(function(t) { return t.id !== taskId; });
                    saveTasks(tasks);
                    render();
                });
            });
        }

        // 初始渲染
        render();

        // 定时刷新（模拟后台处理进度）
        setInterval(render, 2000);
    })();
    </script>
